name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t square-api .

      - name: Lancer le container
        run: docker run -d -p 5000:5000 --name test-api square-api

      - name: Attendre que l'API démarre
        run: sleep 3

      - name: Tester l'endpoint /square
        run: |
          RESULT=$(curl -s "http://localhost:5000/square?n=4")
          echo "Réponse : $RESULT"
          echo "$RESULT" | grep '"result": 16.0'

      - name: Stopper le container
        run: docker stop test-api